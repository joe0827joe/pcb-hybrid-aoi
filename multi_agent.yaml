  version: "2026.1"
  project: "pcb-hybrid-aoi"

  # 全域配置：掛載「去職責化」憲法
  config:
    global_rules: "AGENTRULE.md"  # 最高憲法：定義通訊協議、效能指標與品質門檻
    context_source: "README.md"   # 任務來源：定義當前開發目標與瑕疵類型
    git_integration:
      auto_commit: true
      branch_prefix: "task/aoi-"
      commit_style: "conventional"

  workflow:
    name: "PCB-AOI-Vision-Sprint"
    
    agents:
      - id: "architect_01"
        role: "System Architect"
        instructions: "負責定義數據協議 (Schemas) 與 Fail-soft 邏輯。在定義前必須確保 Interface 符合 AABB 之 Boundary-Focused 要求。"

      - id: "vision_coder_01"
        role: "Senior Vision Developer"
        dependencies: ["architect_01"]
        instructions: "負責實作演算法邏輯。開發前必須閱讀 `ATOMIC_CHECKLIST.md` Phase 1 & 3。實作單元測試必須符合 FIRST 原則，整合測試必須符合 AABB 原則。"

      - id: "perf_reviewer_01"
        role: "Performance & QA Auditor"
        dependencies: ["vision_coder_01"]
        instructions: "負責執行 130ms 門檻驗證。審核時必須對照 `ATOMIC_CHECKLIST.md` 全體 Phase。確認通過後產出 `atomic_audit_signoff.json` 並執行最終 Git 提交。"

  # 執行流：定義產出物（考場）
  execution_flow:
    - step: "define_spec"
      agent: "architect_01"
      environment: "Conda: pcb-aoi (python 3.9+)"
      output: "docs/contracts/detection_schema.md"

    - step: "develop_logic"
      agent: "vision_coder_01"
      input_from: "define_spec"
      # 強制自我稽核指令
      instructions: "實作算法後，請自我檢查是否符合 ATOMIC Phase 1。測試案例必須符合 FIRST/AABB 規範，嚴禁使用絕對路徑。"
      output: 
        - "python_research/src/cv_prototype_v1.py"
        - "python_research/tests/test_cv_prototype.py" 

    - step: "performance_gate"
      agent: "perf_reviewer_01"
      input_from: "develop_logic"
      environment: "Conda: pcb-aoi"
      commands: 
        - "pytest python_research/tests/test_cv_prototype.py"
        - "python python_research/scripts/benchmark_performance.py --threshold 130ms"
      output: "python_research/results/benchmark_report.json" # 改為 JSON 便於 Agent 讀取
      on_failure: "retry: develop_logic"

    - step: "atomic_audit"
      agent: "perf_reviewer_01"
      input_from: ["develop_logic", "performance_gate"]
      instructions: |
        1. 讀取 `benchmark_report.json` 確認效能通過。
        2. 對照 `ATOMIC_CHECKLIST.md` 的所有 Phase 進行最終人工（Agent）審計。
        3. 若有任何項未勾選，必須在 Audit Log 中寫明原因並退回重作。
      output: "python_research/results/atomic_audit_signoff.json"

    - step: "finalize_git_checkpoint"
      agent: "perf_reviewer_01"
      input_from: "atomic_audit"
      # 強制讀取簽章後才能 commit
      instructions: "確認 `atomic_audit_signoff.json` 狀態為 Passed 後，撰寫符合 Conventional Commits 之訊息並提交。"